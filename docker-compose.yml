version: '3.8'

services:
  # ============ Container 1: MiR Robot ROS1 Noetic ============
  mir_ros1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mir_noetic_env
    network_mode: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - SDL_AUDIODRIVER=pulse
      - PULSE_SERVER=unix:/tmp/pulse/native
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_MASTER_URI=http://localhost:11311
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./src:/root/catkin_ws/src:rw
      - ./sherpa-onnx-zipformer-vi-2025-04-20:/root/catkin_ws/models/sherpa-onnx-zipformer-vi-2025-04-20:ro
      - /dev:/dev:rw
      - /run/user/1000/pulse/native:/tmp/pulse/native
      - /home/tuanminh/.config/pulse/cookie:/root/.config/pulse/cookie:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Entrypoint sẽ build lần đầu nếu cần; sau đó chạy ROS master để bridge kết nối
    command: /bin/bash -c "source /opt/ros/noetic/setup.bash && source /root/catkin_ws/devel/setup.bash && roscore"
    tty: true
    stdin_open: true

  # ============ Container 2: ROS1 <-> ROS2 Bridge ============
  ros1_bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: mir_ros1_bridge
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://localhost:11311
    depends_on:
      - mir_ros1
    tty: true
    restart: unless-stopped
